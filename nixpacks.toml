[phases.setup]
nixPkgs = ['nodejs', 'playwright']
aptPkgs = ['curl', 'wget']

[phases.install]
cmds = ['npm install --save-dev @types/express @types/cors @types/node', 'npx playwright install --with-deps']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm run start'

[variables]
NODE_ENV = 'production'
